name: Generate Upload Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate upload keystore
        run: |
          keytool -genkeypair -v \
            -keystore upload.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "lySI9ggXh78KeKRO" \
            -keypass "lySI9ggXh78KeKRO" \
            -dname "CN=Cotext,O=SurCommunication,C=JP"

      - name: Show base64 (for GitHub Secrets)
        run: |
          echo "=== UPLOAD_KEYSTORE base64 (copy this to GitHub Secrets) ==="
          base64 -w 0 upload.jks
          echo ""
          echo "=== END ==="

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore
          path: upload.jks
          retention-days: 7
